[opcache]
opcache.enable=1
opcache.memory_consumption=256        ; bump from 128
opcache.max_accelerated_files=20000   ; bump for Laravel's many files
opcache.validate_timestamps=1
opcache.revalidate_freq=2             ; check every 2s, NOT every request
opcache.file_update_protection=0
opcache.interned_strings_buffer=16    ; add this
opcache.fast_shutdown=1               ; add this