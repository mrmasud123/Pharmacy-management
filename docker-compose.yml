services:
  app:
    build: .
    container_name: laravel_app
    restart: on-failure          # ← retries if DB isn't ready yet
    ports:
      - "8001:80"
    volumes:
      - .:/var/www:delegated        # delegated = faster writes
      - vendor:/var/www/vendor      # ✅ already using named volume (good)
      - storage:/var/www/storage
      - bootstrap_cache:/var/www/bootstrap/cache
      - /var/www/node_modules       # exclude node_modules from bind mount
    depends_on:
      db:
        condition: service_healthy   # ← waits for MySQL healthcheck
    environment:
      - APACHE_DOCUMENT_ROOT=/var/www/public
      - APP_ENV=local

  node:
    image: node:20
    container_name: laravel_node
    working_dir: /app
    volumes:
      - .:/app:cached
      - node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"  # ← explicit bind
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=2000 

  db:
    image: mysql:8
    container_name: laravel_db
    restart: always
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:                          # ← new
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
    depends_on:
      db:
        condition: service_healthy

volumes:
  dbdata:
  vendor:
  storage:
  bootstrap_cache:
  node_modules: